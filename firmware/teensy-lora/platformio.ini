; PlatformIO Project Configuration for Teensy 4.0 LoRa Bridge
;
; To build and upload:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Run: pio run -t upload
;   3. Press the button on Teensy when prompted

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino

; LoRa library by Sandeep Mistry - simpler API, better Teensy support
lib_deps =
    sandeepmistry/LoRa@^0.8.0

; Serial monitor speed (for debugging)
monitor_speed = 115200

; Build flags for Teensy 4.0
build_flags =
    -D ARDUINO_TEENSY40
