; PlatformIO Project Configuration for RangePi LoRa Bridge
;
; RangePi uses RP2040 + E22 LoRa module (EBYTE E22-900T22S with SX1262)
; The E22 module has its own MCU and communicates via UART, not SPI
;
; To build and upload:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Hold BOOTSEL button on RangePi while connecting USB
;   3. Run: pio run -t upload
;
; Alternative: Use picotool for upload

[env:rangepi]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino

; Arduino-Pico by Earle Philhower
board_build.core = earlephilhower

; RangePi uses E22 LoRa module (UART interface, not direct SPI to SX1262)
; Adafruit_ST7789 for the RangePi's 1.14" LCD screen (ST7789, 240x135)
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3

; Serial monitor speed (for debugging)
monitor_speed = 115200

; Build flags for RP2040
build_flags =
    -D ARDUINO_RASPBERRY_PI_PICO
    -D USE_TINYUSB
    -D CFG_TUSB_CONFIG_FILE="\"tusb_config.h\""

; USB settings - use TinyUSB for better USB CDC support
build_unflags = -DUSE_TINYUSB=0

; Upload protocol
upload_protocol = picotool

[env:rangepi_probe]
extends = env:rangepi
build_flags =
    ${env:rangepi.build_flags}
    -D TRUTH_PROBE_MODE=1

[env:rangepi_beacon_unverified]
extends = env:rangepi
build_flags =
    ${env:rangepi.build_flags}
    -D ALLOW_UNVERIFIED_BEACON_TX=1
